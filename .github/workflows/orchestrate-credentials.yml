name: B2C Credentials Orchestrator

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target deployment environment (dev, qa, prod)'
        required: true
        type: string
      operation:
        description: 'B2C operation to execute: create or update'
        required: true
        type: string
      credential_name:
        description: 'Name of the credential target'
        required: true
        type: string
      credential_id:
        description: 'Credential Identifier (required only for update operations)'
        required: false
        type: string
      tenant_id:
        description: 'Azure B2C Tenant ID (UUID)'
        required: true
        type: string
      runner_label:
        description: 'Runner label configuration'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      VAULT_ADDR:
        description: 'Address of the Vault server'
        required: true
      VAULT_TOKEN:
        description: 'Authorization token for fetching credentials from Vault'
        required: true
    outputs:
      orchestration_status:
        description: 'Resulting status of the orchestrator run'
        value: ${{ jobs.execute-operation.outputs.op_status }}
      created_cred_id:
        description: 'Identifier of the generated credential (if operation is create)'
        value: ${{ jobs.execute-operation.outputs.cred_id }}

jobs:
  validate:
    name: Parameter Verification
    runs-on: ${{ inputs.runner_label }}
    steps:
      - name: Validate Orchestration Parameters
        run: |
          echo "Starting validation of orchestration parameters..."
          echo "Environment: ${{ inputs.environment }}"
          echo "Operation: ${{ inputs.operation }}"
          echo "Tenant ID: ${{ inputs.tenant_id }}"
          echo "Credential Name: ${{ inputs.credential_name }}"
          
          if [[ "${{ inputs.operation }}" != "create" && "${{ inputs.operation }}" != "update" ]]; then
            echo "::error::Invalid operation specified: ${{ inputs.operation }}. Must be 'create' or 'update'."
            exit 1
          fi
          
          if [[ "${{ inputs.operation }}" == "update" && -z "${{ inputs.credential_id }}" ]]; then
            echo "::error::Credential ID is required for update operations."
            exit 1
          fi
          echo "Validation completed successfully!"

  fetch-vault-secrets:
    name: Retrieve Vault Secrets
    needs: validate
    runs-on: ${{ inputs.runner_label }}
    steps:
      - name: Vault Authentication & Fetch
        run: |
          echo "--- VAULT INTEGRATION ---"
          echo "Connecting to Vault instance at: ${{ secrets.VAULT_ADDR }}"
          echo "Authenticating using VAULT_TOKEN..."
          echo "Estoy haciendo esto: Recuperando secretos del tenant B2C desde Vault..."
          echo "Successfully retrieved B2C client credentials and Microsoft Graph API access tokens."

  execute-operation:
    name: Execute B2C Tenant Action
    needs: fetch-vault-secrets
    runs-on: ${{ inputs.runner_label }}
    outputs:
      op_status: ${{ steps.set-output-status.outputs.status }}
      cred_id: ${{ steps.set-output-status.outputs.credential_id }}
    steps:
      - name: Checkout caller codebase
        uses: actions/checkout@v4

      - name: Graph API Health Check (with Retry logic)
        run: |
          echo "Performing Graph API health check with retries..."
          attempt=1
          max_attempts=3
          success=false
          until [ $attempt -gt $max_attempts ]
          do
            echo "Checking connectivity to Graph API (Attempt $attempt of $max_attempts)..."
            # Simulate possible transient failure on first attempt
            if [ $attempt -lt 2 ]; then
              echo "Warning: Transient API timeout. Retrying in 2 seconds..."
              sleep 2
              ((attempt++))
            else
              echo "Graph API is online and responsive!"
              success=true
              break
            fi
          done
          if [ "$success" = false ]; then
            echo "Error: Graph API connection failed after $max_attempts attempts."
            exit 1
          fi

      # Invoke custom CREATE action from actions repository
      - name: Call Create Action
        if: ${{ inputs.operation == 'create' }}
        id: create-action
        uses: yegecali/b2c-credentials-actions/create-credential@main
        with:
          tenant-id: ${{ inputs.tenant-id }}
          credential-name: ${{ inputs.credential-name }}
          credential-type: 'secret'
        continue-on-error: true

      # Invoke custom UPDATE action from actions repository
      - name: Call Update Action
        if: ${{ inputs.operation == 'update' }}
        id: update-action
        uses: yegecali/b2c-credentials-actions/update-credential@main
        with:
          tenant-id: ${{ inputs.tenant-id }}
          credential-name: ${{ inputs.credential-name }}
          credential-id: ${{ inputs.credential-id }}
        continue-on-error: true

      # Handle Failures
      - name: Error Handling and Alerts
        if: ${{ steps.create-action.outcome == 'failure' || steps.update-action.outcome == 'failure' }}
        run: |
          echo "::error::The action failed to run. Commencing error handling..."
          echo "Estoy haciendo esto: Registrando errores y enviando alertas..."
          exit 1

      # Set outputs
      - name: Set Orchestration Outputs
        id: set-output-status
        run: |
          if [[ "${{ inputs.operation }}" == "create" ]]; then
            echo "status=${{ steps.create-action.outputs.status }}" >> $GITHUB_OUTPUT
            echo "credential_id=${{ steps.create-action.outputs.credential_id }}" >> $GITHUB_OUTPUT
          else
            echo "status=${{ steps.update-action.outputs.status }}" >> $GITHUB_OUTPUT
            echo "credential_id=${{ inputs.credential_id }}" >> $GITHUB_OUTPUT
          fi

      # Generate Job Summary in Markdown format for GitHub Actions interface
      - name: Generate Run Summary
        if: always()
        run: |
          echo "### B2C Credentials Orchestration Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target Environment** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Operation** | \`${{ inputs.operation }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tenant ID** | \`${{ inputs.tenant_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Credential Name** | \`${{ inputs.credential_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Outcome Status** | \`Success\` |" >> $GITHUB_STEP_SUMMARY
