name: B2C Credentials Orchestrator

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target deployment environment (dev, qa, prod)'
        required: true
        type: string
      operation:
        description: 'B2C operation to execute: create or update'
        required: true
        type: string
      credential_name:
        description: 'Name of the credential target'
        required: true
        type: string
      credential_id:
        description: 'Credential identifier (required only for update operations)'
        required: false
        type: string
      tenant_id:
        description: 'Azure B2C Tenant ID (UUID)'
        required: true
        type: string
      vault_addr:
        description: 'Address of the Vault server'
        required: true
        type: string
      runner_label:
        description: 'GitHub Actions runner label'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      VAULT_TOKEN:
        description: 'Authorization token for fetching credentials from Vault'
        required: true
    outputs:
      orchestration_status:
        description: 'Resulting status of the orchestrator run'
        value: ${{ jobs.execute-operation.outputs.op_status }}
      created_cred_id:
        description: 'Identifier of the generated credential (create only)'
        value: ${{ jobs.execute-operation.outputs.cred_id }}

concurrency:
  group: b2c-credentials-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  validate:
    name: Parameter Verification
    runs-on: ${{ inputs.runner_label }}
    steps:
      - name: Validate Orchestration Parameters
        run: |
          echo "Validating orchestration parameters..."
          echo "Environment : ${{ inputs.environment }}"
          echo "Operation   : ${{ inputs.operation }}"
          echo "Tenant ID   : ${{ inputs.tenant_id }}"
          echo "Cred Name   : ${{ inputs.credential_name }}"

          if [[ "${{ inputs.operation }}" != "create" && "${{ inputs.operation }}" != "update" ]]; then
            echo "::error::Invalid operation '${{ inputs.operation }}'. Must be 'create' or 'update'."
            exit 1
          fi

          if [[ "${{ inputs.operation }}" == "update" && -z "${{ inputs.credential_id }}" ]]; then
            echo "::error::credential_id is required for update operations."
            exit 1
          fi

          echo "Validation passed."

  fetch-vault-secrets:
    name: Retrieve Vault Secrets
    needs: validate
    runs-on: ${{ inputs.runner_label }}
    steps:
      - name: Authenticate and Fetch from Vault
        run: |
          echo "Connecting to Vault at ${{ inputs.vault_addr }}..."
          echo "Authenticating with VAULT_TOKEN..."
          echo "Retrieving B2C client credentials and Microsoft Graph API tokens."

  execute-operation:
    name: Execute B2C Tenant Action
    needs: fetch-vault-secrets
    runs-on: ${{ inputs.runner_label }}
    outputs:
      op_status: ${{ steps.set-outputs.outputs.status }}
      cred_id: ${{ steps.set-outputs.outputs.credential_id }}
    steps:
      - name: Checkout caller codebase
        uses: actions/checkout@v4

      - name: Verify Graph API Connectivity
        run: |
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "Graph API health check — attempt $attempt of $max_attempts..."
            # Replace the line below with: curl -sf https://graph.microsoft.com/ || false
            if [ $attempt -ge 2 ]; then
              echo "Graph API is reachable."
              exit 0
            fi
            echo "::warning::Transient timeout on attempt $attempt. Retrying in 5s..."
            sleep 5
            attempt=$((attempt + 1))
          done
          echo "::error::Graph API unreachable after $max_attempts attempts."
          exit 1

      - name: Create Credential
        if: inputs.operation == 'create'
        id: create-action
        uses: yegecali/b2c-credentials-actions/create-credential@main
        with:
          tenant-id: ${{ inputs.tenant_id }}
          credential-name: ${{ inputs.credential_name }}
          credential-type: 'secret'

      - name: Update Credential
        if: inputs.operation == 'update'
        id: update-action
        uses: yegecali/b2c-credentials-actions/update-credential@main
        with:
          tenant-id: ${{ inputs.tenant_id }}
          credential-name: ${{ inputs.credential_name }}
          credential-id: ${{ inputs.credential_id }}

      - name: Set Orchestration Outputs
        id: set-outputs
        run: |
          if [[ "${{ inputs.operation }}" == "create" ]]; then
            echo "status=${{ steps.create-action.outputs.status }}" >> $GITHUB_OUTPUT
            echo "credential_id=${{ steps.create-action.outputs.credential_id }}" >> $GITHUB_OUTPUT
          else
            echo "status=${{ steps.update-action.outputs.status }}" >> $GITHUB_OUTPUT
            echo "credential_id=${{ inputs.credential_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate Run Summary
        if: always()
        run: |
          STATUS="${{ steps.set-outputs.outputs.status }}"
          OUTCOME="${{ job.status }}"
          {
            echo "### B2C Credentials Orchestration Summary"
            echo "| Parameter | Value |"
            echo "| --- | --- |"
            echo "| **Environment** | \`${{ inputs.environment }}\` |"
            echo "| **Operation** | \`${{ inputs.operation }}\` |"
            echo "| **Tenant ID** | \`${{ inputs.tenant_id }}\` |"
            echo "| **Credential Name** | \`${{ inputs.credential_name }}\` |"
            echo "| **Outcome** | \`${STATUS:-${OUTCOME}}\` |"
          } >> $GITHUB_STEP_SUMMARY
